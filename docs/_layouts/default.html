<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: #fff;
      color: #333;
      line-height: 1.8;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    .site-header {
      padding: 48px 0 40px;
    }
    .site-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
    }
    .site-header h1 a {
      color: inherit;
      text-decoration: none;
    }
    .site-header p {
      color: #999;
      font-size: 14px;
      margin-top: 4px;
    }

    /* Content */
    .content { padding-bottom: 80px; }

    /* Post list */
    .post-list { list-style: none; }
    .post-list li {
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .post-list li:first-child { border-top: 1px solid #f0f0f0; }
    .post-date {
      font-size: 14px;
      color: #aaa;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .post-list a {
      color: #333;
      text-decoration: none;
      font-size: 15px;
    }
    .post-list a:hover { color: #555; text-decoration: underline; }

    /* Post page */
    .post-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .post-header h1 {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.4;
      color: #111;
      margin-bottom: 6px;
    }
    .post-header .meta {
      font-size: 14px;
      color: #aaa;
    }

    .post-content h1 { font-size: 24px; font-weight: 600; color: #111; margin: 32px 0 12px; }
    .post-content h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin: 36px 0 12px;
    }
    .post-content h3 {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      margin: 28px 0 8px;
    }
    .post-content h3 a { color: #2563eb; text-decoration: none; }
    .post-content h3 a:hover { text-decoration: underline; }
    .post-content p { margin-bottom: 14px; color: #444; font-size: 15px; }
    .post-content em { color: #888; font-size: 13px; }
    .post-content strong { color: #222; font-weight: 600; }
    .post-content blockquote {
      margin: 12px 0 20px;
      padding: 14px 18px;
      background: #f8f9fa;
      border-left: 3px solid #2563eb;
      border-radius: 0 6px 6px 0;
      color: #555;
      font-size: 14px;
    }
    .post-content blockquote p { margin-bottom: 4px; color: inherit; }
    .post-content blockquote p:last-child { margin-bottom: 0; }
    .post-content ul, .post-content ol {
      margin: 10px 0 14px 24px;
      color: #444;
      font-size: 15px;
    }
    .post-content li { margin-bottom: 4px; }
    .post-content hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }
    .post-content a { color: #2563eb; text-decoration: none; }
    .post-content a:hover { text-decoration: underline; }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #666; }

    .site-footer {
      padding: 24px 0;
      border-top: 1px solid #f0f0f0;
      text-align: center;
      color: #ccc;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .site-header { padding: 32px 0 28px; }
      .post-header h1 { font-size: 22px; }
      .post-list li { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </header>
    <main class="content">
      {{ content }}
    </main>
    <footer class="site-footer">
      AI Frontier Insight Bot
    </footer>
  </div>
</body>
</html>

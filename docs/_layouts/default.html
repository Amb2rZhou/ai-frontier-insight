<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: #0f0f13;
      color: #e0e0e6;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .site-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 40px;
    }
    .site-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .site-header h1 a {
      text-decoration: none;
      background: inherit;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .site-header p {
      color: #8888a0;
      font-size: 14px;
      margin-top: 6px;
    }

    /* Content */
    .content { padding-bottom: 80px; }

    /* Post list */
    .post-list { list-style: none; }
    .post-list li {
      padding: 20px 24px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    .post-list li:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(129, 140, 248, 0.3);
      transform: translateY(-1px);
    }
    .post-date {
      font-size: 13px;
      color: #6b6b80;
      font-variant-numeric: tabular-nums;
      display: block;
      margin-bottom: 4px;
    }
    .post-list a {
      color: #e0e0e6;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
    }
    .post-list a:hover { color: #a78bfa; }

    /* Post page */
    .post-header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .post-header h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.3;
      color: #f0f0f5;
      margin-bottom: 8px;
    }
    .post-header .meta {
      font-size: 14px;
      color: #6b6b80;
    }

    .post-content h2 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f5;
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .post-content h3 {
      font-size: 18px;
      font-weight: 600;
      color: #c8c8d8;
      margin: 32px 0 12px;
    }
    .post-content h3 a {
      color: #818cf8;
      text-decoration: none;
    }
    .post-content h3 a:hover {
      color: #a78bfa;
      text-decoration: underline;
    }
    .post-content p {
      margin-bottom: 16px;
      color: #c0c0d0;
    }
    .post-content em {
      color: #8888a0;
      font-size: 14px;
    }
    .post-content strong {
      color: #e0e0e6;
      font-weight: 600;
    }
    .post-content blockquote {
      margin: 16px 0 24px;
      padding: 16px 20px;
      background: rgba(129, 140, 248, 0.06);
      border-left: 3px solid #818cf8;
      border-radius: 0 10px 10px 0;
      color: #b0b0c8;
      font-size: 15px;
    }
    .post-content blockquote p {
      margin-bottom: 6px;
      color: inherit;
    }
    .post-content blockquote p:last-child { margin-bottom: 0; }
    .post-content ul, .post-content ol {
      margin: 12px 0 16px 24px;
      color: #c0c0d0;
    }
    .post-content li { margin-bottom: 6px; }
    .post-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 32px 0;
    }
    .post-content a {
      color: #818cf8;
      text-decoration: none;
    }
    .post-content a:hover { text-decoration: underline; }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #6b6b80;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #a78bfa; }

    /* Footer */
    .site-footer {
      padding: 32px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
      color: #4a4a5a;
      font-size: 13px;
    }

    /* Mobile */
    @media (max-width: 640px) {
      .site-header { padding: 32px 0 24px; }
      .site-header h1 { font-size: 24px; }
      .post-header h1 { font-size: 24px; }
      .post-list li { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      AI Frontier Insight Bot &middot; Powered by AI
    </footer>
  </div>
</body>
</html>

---
layout: default
title: AI Frontier Insight
---

<ul class="post-list">
{% assign sorted = site.posts | sort: 'date' | reverse %}
{% for post in sorted %}
  <li>
    <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
{% endfor %}
</ul>
